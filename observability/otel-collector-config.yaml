receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  logging:
    loglevel: info
  # SignOz Cloud or self-hosted: set SIGNOZ_OTLP_ENDPOINT and uncomment
  # otlp/signoz:
  #   endpoint: ${SIGNOZ_OTLP_ENDPOINT}
  #   tls:
  #     insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]

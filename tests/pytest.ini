[pytest]
# Test markers for conditional test execution
# NOTE: Markers allow tests to be skipped or filtered based on server capabilities
markers =
    requires_lockd: Requires NFS lockd support (may be skipped if unavailable)
    requires_permissions: Requires permission enforcement (may behave differently as root)
    performance: Performance or throughput tests (disabled unless PERF_TESTS=1)
    off_nominal: Fault-injection tests (expected failure scenarios)
    integrity: Data integrity checks for multiple sizes and patterns

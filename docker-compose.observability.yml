# Optional OTLP collector for v2 observability (SignOz-compatible)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml \
#     --profile default --profile observability up --build --abort-on-container-exit
#
# Point OTEL_EXPORTER_OTLP_ENDPOINT at your SignOz Cloud ingest URL when not using the local collector.

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: otel-collector
    profiles:
      - observability
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - nfs-net

  test-runner:
    environment:
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - NFS_RUN_ID=${NFS_RUN_ID:-}

  test-runner-faults:
    environment:
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - NFS_RUN_ID=${NFS_RUN_ID:-}
